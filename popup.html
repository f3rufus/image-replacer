<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Image Replacer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #16213e;
    --accent: #e94560;
    --accent-dim: rgba(233,69,96,0.15);
    --text: #e0e0e0;
    --text-muted: #666;
    --border: rgba(255,255,255,0.08);
  }

  html, body {
    width: 100%;
    height: 100%;
  }

  body {
    /* Desktop: fixed popup size */
    min-width: 340px;
    max-width: 420px;
    min-height: 200px;
    max-height: 560px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Mobile: full width, full height */
  @media (max-width: 480px) {
    body {
      max-width: 100vw;
      max-height: 100vh;
      min-height: 100vh;
      font-size: 15px;
    }
  }

  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: var(--surface);
    border-bottom: 1px solid rgba(233,69,96,0.3);
    flex-shrink: 0;
  }

  .logo { font-size: 22px; line-height: 1; }

  .header-info { flex: 1; min-width: 0; }

  .header-info h1 {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.3px;
  }

  .header-info .subtitle {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tab {
    flex: 1;
    padding: 11px 8px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab:hover { color: #ccc; background: rgba(255,255,255,0.03); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: var(--accent-dim);
  }

  .tab-content { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .tab-content.active { display: flex; }

  /* ── This page ── */
  .page-rules-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    -webkit-overflow-scrolling: touch;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 10px; }
  .empty-state p { font-size: 13px; line-height: 1.7; }

  .rule-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .rule-images {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    max-height: 110px;
  }

  .rule-img-wrap {
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .rule-img-label {
    position: absolute;
    top: 4px;
    left: 4px;
    font-size: 9px;
    background: rgba(0,0,0,0.7);
    color: #aaa;
    padding: 2px 5px;
    border-radius: 3px;
    letter-spacing: 0.3px;
  }

  .rule-img-wrap img {
    width: 100%;
    height: 110px;
    object-fit: contain;
  }

  .rule-meta {
    padding: 8px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .rule-src {
    font-size: 11px;
    color: var(--text-muted);
    font-family: monospace;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .rule-del {
    background: none;
    border: 1px solid rgba(233,69,96,0.3);
    color: var(--accent);
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: inherit;
    /* bigger tap target on mobile */
    min-height: 32px;
  }
  .rule-del:active { background: var(--accent-dim); }

  .clear-page-btn {
    margin: 0 12px 12px;
    padding: 10px;
    background: none;
    border: 1px solid rgba(233,69,96,0.25);
    border-radius: 6px;
    color: var(--accent);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    flex-shrink: 0;
    min-height: 40px;
  }
  .clear-page-btn:active { background: var(--accent-dim); }

  /* ── All rules ── */
  .all-rules-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    -webkit-overflow-scrolling: touch;
  }

  .page-group { margin-bottom: 14px; }

  .page-group-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px 6px 0 0;
    gap: 8px;
  }

  .page-url {
    font-size: 11px;
    color: #aaa;
    font-family: monospace;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .page-del {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
    min-width: 30px;
    min-height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .page-del:active { color: var(--accent); }

  .page-group-rules {
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 6px 6px;
    overflow: hidden;
  }

  .mini-rule {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .mini-rule:last-child { border-bottom: none; }

  .mini-rule-src {
    font-size: 10px;
    font-family: monospace;
    color: var(--text-muted);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .arrow { color: var(--accent); font-size: 12px; flex-shrink: 0; }

  .mini-rule-del {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    min-width: 28px;
    min-height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .mini-rule-del:active { color: var(--accent); }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(233,69,96,0.3); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">🔄</div>
  <div class="header-info">
    <h1>Image Replacer</h1>
    <div class="subtitle" id="current-url">Loading…</div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="page">This page</button>
  <button class="tab" data-tab="all">All rules</button>
</div>

<div class="tab-content active" id="tab-page">
  <div class="page-rules-wrap" id="page-rules-list"></div>
  <button class="clear-page-btn" id="clear-page-btn" style="display:none">
    🗑 Delete all rules for this page
  </button>
</div>

<div class="tab-content" id="tab-all">
  <div class="all-rules-wrap" id="all-rules-list"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
