<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Replacer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --accent: #e94560;
      --accent-dim: rgba(233, 69, 96, 0.15);
      --text: #e0e0e0;
      --text-muted: #666;
      --border: rgba(255, 255, 255, 0.08);
    }

    body {
      width: 380px;
      min-height: 200px;
      max-height: 560px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid rgba(233, 69, 96, 0.3);
    }

    .logo {
      font-size: 20px;
      line-height: 1;
    }

    .header-info h1 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .header-info .subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 290px;
    }

    .tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 9px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab:hover {
      color: #ccc;
      background: rgba(255, 255, 255, 0.03);
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: var(--accent-dim);
    }

    .tab-content {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .tab-content.active {
      display: flex;
    }

    /* ── "This page" tab ── */
    .page-rules-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 12px;
      line-height: 1.6;
    }

    .rule-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .rule-images {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      max-height: 90px;
    }

    .rule-img-wrap {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .rule-img-label {
      position: absolute;
      top: 4px;
      left: 4px;
      font-size: 9px;
      background: rgba(0, 0, 0, 0.7);
      color: #aaa;
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: 0.3px;
    }

    .rule-img-wrap img {
      width: 100%;
      height: 90px;
      object-fit: contain;
    }

    .rule-meta {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .rule-src {
      font-size: 10px;
      color: var(--text-muted);
      font-family: monospace;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rule-del {
      background: none;
      border: 1px solid rgba(233, 69, 96, 0.3);
      color: var(--accent);
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .rule-del:hover {
      background: var(--accent-dim);
    }

    .clear-page-btn {
      margin: 8px 12px 12px;
      padding: 8px;
      background: none;
      border: 1px solid rgba(233, 69, 96, 0.25);
      border-radius: 6px;
      color: var(--accent);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .clear-page-btn:hover {
      background: var(--accent-dim);
    }

    /* ── "All rules" tab ── */
    .all-rules-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .page-group {
      margin-bottom: 12px;
    }

    .page-group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px 6px 0 0;
      gap: 8px;
    }

    .page-url {
      font-size: 11px;
      color: #aaa;
      font-family: monospace;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .page-del {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      transition: color 0.15s;
      padding: 0 2px;
    }

    .page-del:hover {
      color: var(--accent);
    }

    .page-group-rules {
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 6px 6px;
      overflow: hidden;
    }

    .mini-rule {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }

    .mini-rule:last-child {
      border-bottom: none;
    }

    .mini-rule-src {
      font-size: 10px;
      font-family: monospace;
      color: var(--text-muted);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini-rule-del {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      transition: color 0.15s;
      padding: 0 2px;
    }

    .mini-rule-del:hover {
      color: var(--accent);
    }

    .arrow {
      color: var(--accent);
      font-size: 12px;
    }

    scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(233, 69, 96, 0.3);
      border-radius: 2px;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">🔄</div>
    <div class="header-info">
      <h1>Image Replacer</h1>
      <div class="subtitle" id="current-url">Download...</div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="page">This page</button>
    <button class="tab" data-tab="all">All rules</button>
  </div>

  <!-- Tab: This page -->
  <div class="tab-content active" id="tab-page">
    <div class="page-rules-wrap" id="page-rules-list"></div>
    <button class="clear-page-btn" id="clear-page-btn" style="display:none">
      🗑 Delete all rules for this page
    </button>
  </div>

  <!-- Tab: All rules -->
  <div class="tab-content" id="tab-all">
    <div class="all-rules-wrap" id="all-rules-list"></div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
